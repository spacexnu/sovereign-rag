site_name: SovereignRAG
site_url: https://spacexnu.github.io/sovereign-rag/
repo_url: https://github.com/spacexnu/sovereign-rag
repo_name: spacexnu/sovereign-rag
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Overview: index.md
  - Getting Started:
      - Install: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - Ingest References: user-guide/ingest.md
      - Analyze Code: user-guide/analyze.md
      - Changed Files: user-guide/changed-files.md
      - Reports: user-guide/reports.md
  - Reference:
      - CLI: reference/cli.md
      - Makefile: reference/makefile.md
      - Configuration: reference/configuration.md
  - Development:
      - Architecture: development/architecture.md
      - Testing: development/testing.md
      - GitHub Pages: development/github-pages.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
